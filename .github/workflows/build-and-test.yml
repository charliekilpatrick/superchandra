# Build and test superchandra from scratch.
# Job 1: Install repo + deps, run unit tests (no CIAO).
# Job 2: Install CIAO via conda (latest), install repo, run full test suite including CIAO-dependent tests.
name: Build and test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (no CIAO)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project from scratch
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests (exclude CIAO and network)
        run: |
          pytest -m "not ciao and not network" tests/

  test-with-ciao:
    name: Test with CIAO (latest)
    runs-on: ubuntu-latest
    # CIAO 4.18 requires Python 3.12; conda install is large and slow
    timeout-minutes: 90
    continue-on-error: true  # optional: CIAO install can fail (disk/time); unit job still required
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda and create CIAO env
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          use-mamba: true
          channels: https://cxc.cfa.harvard.edu/conda/ciao,conda-forge
          channel-priority: strict
          environment-file: environment-ciao.yml
          activate-environment: test

      - name: Verify CIAO
        shell: bash -l {0}
        run: |
          which make_instmap_weights || true
          make_instmap_weights --help || true

      - name: Install project from scratch
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run all tests (including CIAO)
        shell: bash -l {0}
        run: |
          pytest -m "not network" tests/
